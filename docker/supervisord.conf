# ---------------------------------------------------------------------------
# Mercator - Supervisor configuration
# Only long-running daemons here.
# All one-shot init tasks (migrate, passport, key:generate) are in entrypoint.sh
# ---------------------------------------------------------------------------

[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

# ---------------------------------------------------------------------------
# Laravel log → Docker stdout
# tail -F relaie laravel.log vers stdout de supervisord (docker logs)
# ---------------------------------------------------------------------------
[program:laravel-log]
command=tail -F /var/www/mercator/storage/logs/laravel.log
autostart=true
autorestart=true
priority=5
startsecs=0
stdout_logfile=/proc/1/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/proc/1/fd/2
stderr_logfile_maxbytes=0

# ---------------------------------------------------------------------------
# PHP-FPM
# Tourne en root — gère lui-même son user via /etc/php*/php-fpm.d/www.conf
# ---------------------------------------------------------------------------
[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
priority=10
startsecs=2
stdout_logfile=/proc/1/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/proc/1/fd/2
stderr_logfile_maxbytes=0

# ---------------------------------------------------------------------------
# Nginx
# Port 8080 > 1024 — peut tourner en mercator sans privilèges root
# ---------------------------------------------------------------------------
[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=20
startsecs=2
stdout_logfile=/proc/1/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/proc/1/fd/2
stderr_logfile_maxbytes=0

# ---------------------------------------------------------------------------
# Laravel Queue Worker
# ---------------------------------------------------------------------------
[program:queue]
command=php /var/www/mercator/artisan queue:work --sleep=3 --tries=3 --max-time=3600
directory=/var/www/mercator
user=mercator
autostart=true
autorestart=true
priority=30
startsecs=3
stdout_logfile=/proc/1/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/proc/1/fd/2
stderr_logfile_maxbytes=0

# ---------------------------------------------------------------------------
# Laravel Scheduler (remplace crond — aucun privilège root nécessaire)
# Boucle toutes les 60s, pattern recommandé pour Laravel en container
# ---------------------------------------------------------------------------
[program:scheduler]
command=/bin/bash -c "while true; do php /var/www/mercator/artisan schedule:run; sleep 60; done"
directory=/var/www/mercator
user=mercator
autostart=true
autorestart=true
priority=40
stdout_logfile=/proc/1/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/proc/1/fd/2
stderr_logfile_maxbytes=0