name: Deploy docs

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: pip install "mkdocs>=1.6,<2.0" "mkdocs-material>=9.0,<10.0"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
