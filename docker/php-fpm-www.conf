; ---------------------------------------------------------------------------
; Mercator - PHP-FPM pool configuration
; Surcharge /usr/local/etc/php-fpm.d/www.conf pour aligner user/group
; sur le propriétaire des fichiers applicatifs (mercator:www)
; ---------------------------------------------------------------------------

[www]
user = mercator
group = www

; Écoute sur TCP (cohérent avec nginx fastcgi_pass 127.0.0.1:9000)
listen = 127.0.0.1:9000

; Process management
pm = dynamic
pm.max_children = 20
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500

; Transmettre les variables d'environnement au pool
clear_env = no

; Logs vers stdout/stderr de supervisord (PID 1)
; catch_workers_output : capture le stderr des workers php-fpm (Laravel stderr channel)
; decorate_workers_output=no : évite les préfixes "NOTICE: child ... said into stderr:" parasites
php_admin_value[error_log] = /proc/1/fd/2
php_admin_flag[log_errors] = on
catch_workers_output = yes
decorate_workers_output = no

; Sessions et uploads
php_value[session.save_path] = /var/www/mercator/storage/framework/sessions
php_value[upload_max_filesize] = 100M
php_value[post_max_size] = 100M