# ---------------------------------------------------------------------------
# Mercator - Nginx main configuration
# Remplace /etc/nginx/nginx.conf (Alpine default) pour :
#   - supprimer la directive "user" (nginx tourne déjà sous le bon uid)
#   - remplacer /dev/stdout par /proc/1/fd/1 (accessible depuis enfant supervisord)
# ---------------------------------------------------------------------------

worker_processes auto;
pid /tmp/nginx.pid;

error_log /proc/1/fd/2 warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /proc/1/fd/1 main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Chemins temporaires sans /var/lib/nginx (évite les erreurs de permission)
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;

    include /etc/nginx/http.d/*.conf;
}